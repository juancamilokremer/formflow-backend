spring:
  application:
    name: formflow-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # SMTP: MailHog en dev (sin auth), SendGrid en prod via variables de entorno
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# Logging — el MDC (requestId, tenantId, userId) lo puebla RequestLoggingFilter + JwtAuthenticationFilter
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId:-}] [t:%X{tenantId:-}] [u:%X{userId:-}] %logger{36} : %msg%n"

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when-authorized

# OpenAPI / Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# Configuración de la aplicación
app:
  jwt:
    secret: ${JWT_SECRET:cambiar-esto-en-produccion-usar-variable-de-entorno}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}       # 24 horas
    refresh-expiration-ms: ${JWT_REFRESH_MS:604800000} # 7 días
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200}
  mail:
    from: ${MAIL_FROM:no-reply@formflow.app}
    from-name: ${MAIL_FROM_NAME:FormFlow}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:4200}
  # Executor del envío asíncrono de correos (AsyncConfig)
  async:
    email:
      core-pool-size: ${EMAIL_POOL_CORE:2}
      max-pool-size: ${EMAIL_POOL_MAX:4}
      queue-capacity: ${EMAIL_QUEUE_CAPACITY:100}
