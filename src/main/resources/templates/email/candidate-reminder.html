<!DOCTYPE html>
<!-- Variables: candidateName, convocatoriaName, tenantName, surveyUrl, endDate (nullable) -->
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<body>
<div th:replace="~{email/base-styles :: layout(~{::content})}">
    <th:block th:fragment="content">
        <h1 style="color:#111827; font-size:22px; margin:0 0 16px;" th:text="#{email.candidate.reminder.title}">Recordatorio</h1>
        <p style="color:#374151; font-size:15px; margin:0 0 8px;"
           th:text="#{email.candidate.reminder.greeting(${candidateName})}">Hola</p>
        <p style="color:#374151; font-size:15px; line-height:1.6; margin:0 0 8px;"
           th:text="#{email.candidate.reminder.body(${convocatoriaName})}">Aún no has respondido.</p>
        <p th:if="${endDate}" style="color:#374151; font-size:15px; line-height:1.6; margin:0 0 24px;"
           th:text="#{email.candidate.reminder.deadline(${endDate})}">Fecha límite.</p>
        <p th:unless="${endDate}" style="margin:0 0 24px;"></p>
        <a th:href="${surveyUrl}"
           style="display:inline-block; background-color:#3B82F6; color:#ffffff; text-decoration:none;
                  padding:12px 28px; border-radius:6px; font-size:15px; font-weight:bold;"
           th:text="#{email.candidate.reminder.cta}">Responder ahora</a>
    </th:block>
</div>
</body>
</html>
