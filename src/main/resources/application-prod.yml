spring:
  mail:
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    show-sql: false

logging:
  level:
    com.kodelabs.formflow: INFO
    root: WARN

# Swagger stays enabled in production for MVP (issue #15, option 2):
# it eases client demos and the API only exposes tenant data behind JWT.
# Revisit before GA: restrict by IP or disable.
springdoc:
  swagger-ui:
    enabled: true

app:
  cors:
    allowed-origins: ${CORS_ORIGINS}
