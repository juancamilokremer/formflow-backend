<!DOCTYPE html>
<!-- Shared fragment with the common email layout.
     Usage: th:replace="~{email/base-styles :: layout(~{::content})} -->
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<body>
<div th:fragment="layout(content)"
     style="margin:0; padding:0; background-color:#f4f5f7; font-family:Arial,Helvetica,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
           style="background-color:#f4f5f7; padding:32px 0;">
        <tr>
            <td align="center">
                <table role="presentation" width="560" cellpadding="0" cellspacing="0"
                       style="background-color:#ffffff; border-radius:8px; overflow:hidden;">
                    <tr>
                        <td style="background-color:#3B82F6; padding:20px 32px;">
                            <span style="color:#ffffff; font-size:20px; font-weight:bold;">FormFlow</span>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:32px;">
                            <th:block th:replace="${content}"/>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:16px 32px; background-color:#f9fafb; border-top:1px solid #e5e7eb;">
                            <span style="color:#6b7280; font-size:12px;" th:text="#{email.footer}">FormFlow — Kode Labs</span>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</div>
</body>
</html>
