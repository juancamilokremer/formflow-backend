spring:
  datasource:
    url: jdbc:h2:mem:formflow_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
  flyway:
    enabled: false

app:
  jwt:
    secret: ${JWT_SECRET:test-secret-para-ci-minimo-32-caracteres-ok}
    expiration-ms: 3600000
    refresh-expiration-ms: 86400000
