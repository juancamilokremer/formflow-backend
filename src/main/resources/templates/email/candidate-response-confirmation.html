<!DOCTYPE html>
<!-- Variables: candidateName, convocatoriaName, tenantName -->
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<body>
<div th:replace="~{email/base-styles :: layout(~{::content})}">
    <th:block th:fragment="content">
        <h1 style="color:#111827; font-size:22px; margin:0 0 16px;" th:text="#{email.candidate.confirmation.title}">Respuesta registrada</h1>
        <p style="color:#374151; font-size:15px; margin:0 0 8px;"
           th:text="#{email.candidate.confirmation.greeting(${candidateName})}">Hola</p>
        <p style="color:#374151; font-size:15px; line-height:1.6; margin:0 0 8px;"
           th:text="#{email.candidate.confirmation.body(${convocatoriaName}, ${tenantName})}">Tu respuesta fue registrada.</p>
        <p style="color:#6b7280; font-size:13px; margin:24px 0 0;"
           th:text="#{email.candidate.confirmation.note}">No es necesaria ninguna acción adicional.</p>
    </th:block>
</div>
</body>
</html>
