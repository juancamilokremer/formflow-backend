name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build y Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: formflow_test
          POSTGRES_USER: formflow
          POSTGRES_PASSWORD: formflow123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar y ejecutar tests
        run: mvn clean verify
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/formflow_test
          SPRING_DATASOURCE_USERNAME: formflow
          SPRING_DATASOURCE_PASSWORD: formflow123
          JWT_SECRET: test-secret-para-ci-minimo-32-caracteres

      - name: Publicar reporte de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/

  deploy:
    name: Deploy a Railway
    runs-on: ubuntu-latest
    needs: build
    # CD only on merge/push to main, never on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Verificar RAILWAY_TOKEN
        id: token
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        # Skip gracefully while Railway is not configured yet — keeps main green
        run: |
          if [ -n "$RAILWAY_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::RAILWAY_TOKEN no está configurado — deploy omitido (ver issue #14)"
          fi

      - name: Instalar Railway CLI
        if: steps.token.outputs.available == 'true'
        run: npm install -g @railway/cli

      - name: Deploy
        if: steps.token.outputs.available == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service formflow-backend --detach

      - name: Verificar health check
        if: steps.token.outputs.available == 'true'
        env:
          HEALTH_URL: ${{ vars.RAILWAY_HEALTH_URL }}
        # RAILWAY_HEALTH_URL is a repository variable, e.g. https://formflow-backend.up.railway.app/actuator/health
        run: |
          if [ -z "$HEALTH_URL" ]; then
            echo "::notice::RAILWAY_HEALTH_URL no está configurada — verificación omitida"
            exit 0
          fi
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$HEALTH_URL" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check OK"
              exit 0
            fi
            echo "Intento $i/30 — status $STATUS, reintentando en 10s..."
            sleep 10
          done
          echo "::error::El health check no respondió 200 después de 5 minutos"
          exit 1
