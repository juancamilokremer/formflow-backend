<!DOCTYPE html>
<!-- Variables: userName, resetUrl, expirationHours -->
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<body>
<div th:replace="~{email/base-styles :: layout(~{::content})}">
    <th:block th:fragment="content">
        <h1 style="color:#111827; font-size:22px; margin:0 0 16px;" th:text="#{email.reset.title}">Restablece tu contraseña</h1>
        <p style="color:#374151; font-size:15px; margin:0 0 8px;"
           th:text="#{email.reset.greeting(${userName})}">Hola</p>
        <p style="color:#374151; font-size:15px; line-height:1.6; margin:0 0 24px;"
           th:text="#{email.reset.body(${expirationHours})}">Recibimos una solicitud.</p>
        <a th:href="${resetUrl}"
           style="display:inline-block; background-color:#3B82F6; color:#ffffff; text-decoration:none;
                  padding:12px 28px; border-radius:6px; font-size:15px; font-weight:bold;"
           th:text="#{email.reset.cta}">Restablecer contraseña</a>
        <p style="color:#6b7280; font-size:13px; line-height:1.6; margin:24px 0 0;"
           th:text="#{email.reset.ignore}">Si no fuiste tú, ignora este correo.</p>
    </th:block>
</div>
</body>
</html>
