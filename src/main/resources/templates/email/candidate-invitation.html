<!DOCTYPE html>
<!-- Variables: candidateName, convocatoriaName, tenantName, surveyUrl -->
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<body>
<div th:replace="~{email/base-styles :: layout(~{::content})}">
    <th:block th:fragment="content">
        <h1 style="color:#111827; font-size:22px; margin:0 0 16px;" th:text="#{email.candidate.invitation.title}">Invitación a convocatoria</h1>
        <p style="color:#374151; font-size:15px; margin:0 0 8px;"
           th:text="#{email.candidate.invitation.greeting(${candidateName})}">Hola</p>
        <p style="color:#374151; font-size:15px; line-height:1.6; margin:0 0 24px;"
           th:text="#{email.candidate.invitation.body(${convocatoriaName}, ${tenantName})}">Has sido invitado.</p>
        <a th:href="${surveyUrl}"
           style="display:inline-block; background-color:#3B82F6; color:#ffffff; text-decoration:none;
                  padding:12px 28px; border-radius:6px; font-size:15px; font-weight:bold;"
           th:text="#{email.candidate.invitation.cta}">Responder encuesta</a>
        <p style="color:#6b7280; font-size:13px; margin:24px 0 0;"
           th:text="#{email.candidate.invitation.note}">Este enlace es personal e intransferible.</p>
    </th:block>
</div>
</body>
</html>
