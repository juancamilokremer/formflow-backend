version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: formflow-postgres
    environment:
      POSTGRES_DB: formflow_dev
      POSTGRES_USER: formflow
      POSTGRES_PASSWORD: formflow123
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U formflow -d formflow_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # SMTP de desarrollo: captura todos los correos sin enviarlos realmente.
  # UI web para verlos: http://localhost:8025
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: formflow-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # UI web

  # Análisis de calidad de código — solo para uso local, no corre en CI.
  # Dashboard: http://localhost:9000  (admin / admin al primer inicio)
  # Para analizar: mvn verify sonar:sonar
  sonarqube:
    image: sonarqube:10-community
    container_name: formflow-sonarqube
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgres:5432/sonarqube
      SONAR_JDBC_USERNAME: formflow
      SONAR_JDBC_PASSWORD: formflow123
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
    # SonarQube requiere vm.max_map_count >= 524288 en Linux/WSL.
    # En Windows con Docker Desktop esto se maneja automáticamente.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

volumes:
  postgres_data:
  sonarqube_data:
  sonarqube_logs:
