version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: formflow-postgres
    environment:
      POSTGRES_DB: formflow_dev
      POSTGRES_USER: formflow
      POSTGRES_PASSWORD: formflow123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U formflow -d formflow_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
